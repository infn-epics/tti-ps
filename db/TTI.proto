Terminator = CR LF;
ReplyTimeout = 3000;
ReadTimeout = 500;
ExtraInput = Ignore;

# voltege
getVoltageRbv {
    out "\x14\x01VO?";
    in " %fV";
}

getVoltageSetpoint {
    out "\x14\x01V?";
    in "V %f";
}

setVoltage {
    out "\x14\x01V %.3f";
}

# current
setCurrent {
    out "\x14\x01I %.3f";
}

getCurrent {
    out "\x14\x01IO?";
    in " %fA";
}

getCurrentSetpoint {
    out "\x14\x01I?";
    in "I %f";
}
# output
setOutput {
    out "\x14\x01OP %d";
}
# ovp

getOVP {
    out "\x14\x01OVP?";
    in "OVP %f";
}

setOVP {
    out "\x14\x01OVP %.3f";
}

# potenza 
getPower {
    out "\x14\x01POWER?";
    in " %f";
}

# identitificazione device

getIdentity {
    out "\x14\x01*IDN?";
    in "%#s";
}

# reset

resetInstrument {
    out "\x14\x01*RST";
}

# stato errori
getStatusByte {         #stato device
    out "\x14\x01*STB?";
    in "%d";
}

clearStatus {
    out "\x14\x01*CLS";
}

getEventStatus {         #stato errori
    out "\x14\x01*ESR?";
    in "%d";
}

getLimitStatus {
    out "\x14\x01LSR?";
    in "%d";
}